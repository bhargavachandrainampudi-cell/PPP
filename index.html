<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .notification-slide { animation: slide-in 0.5s ease-out; }
    .fade-in { animation: fade-in 0.6s ease-out forwards; }
    .activity-item { animation: fade-in 0.4s ease-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
  </style>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   
   <!-- Notification Toast -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
     <div class="text-3xl">🐾</div>
     <div>
      <p class="font-bold">Pet Alert!</p>
      <p class="text-sm opacity-90" id="notification-message"></p>
     </div>
    </div>
   </div>

   <!-- Setup Screen (Replaced Arduino with Simulation) -->
   <div id="setup-screen" class="min-h-full flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md fade-in text-center">
      <div class="text-7xl mb-4">🏠🐕</div>
      <h1 class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p class="text-slate-300 mb-8">Ready to monitor your pet's activity?</p>
      
      <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
        <button onclick="startTracking()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-emerald-500/30"> 
          Enter Dashboard 🐾 
        </button>
      </div>
    </div>
   </div>

   <!-- Dashboard Screen -->
   <div id="dashboard-screen" class="min-h-full p-4 md:p-8 hidden">
    <div class="max-w-5xl mx-auto">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-white">Activity Dashboard</h1>
        <button onclick="toggleSimulation()" id="sim-btn" class="w-full sm:w-auto px-6 py-3 bg-purple-500 text-white font-bold rounded-xl hover:bg-purple-600 transition-all shadow-lg"> 
          Start Simulation 🐾 
        </button>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8 text-center sm:text-left">
        <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-sm">
          <p class="text-slate-400 text-xs uppercase tracking-wider font-semibold">Last Entry</p>
          <p id="last-entry" class="text-3xl md:text-4xl text-emerald-400 font-black mt-1">--:--</p>
        </div>
        <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-sm">
          <p class="text-slate-400 text-xs uppercase tracking-wider font-semibold">Last Exit</p>
          <p id="last-exit" class="text-3xl md:text-4xl text-blue-400 font-black mt-1">--:--</p>
        </div>
      </div>

      <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-5 md:p-8 border border-white/20 shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-6">Recent Movements</h2>
        <div id="activity-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          <p class="text-slate-500 text-center py-12 italic">Waiting for activity...</p>
        </div>
      </div>
    </div>
   </div>

  </div>

  <script>
    const STORAGE_KEY = 'pet_tracker_history';
    let isSimulating = false;

    // Load persistent history on startup
    window.addEventListener('DOMContentLoaded', () => {
      const savedHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      if (savedHistory.length > 0) {
        const list = document.getElementById('activity-list');
        list.innerHTML = ''; 
        [...savedHistory].reverse().forEach(item => renderActivityItem(item, false));
        const lastIn = savedHistory.find(h => h.direction === 'IN');
        const lastOut = savedHistory.find(h => h.direction === 'OUT');
        if (lastIn) updateStatusCards(lastIn);
        if (lastOut) updateStatusCards(lastOut);
      }
    });

    function startTracking() {
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
    }

    async function toggleSimulation() {
      isSimulating = !isSimulating;
      const btn = document.getElementById('sim-btn');
      if (isSimulating) {
        btn.innerText = "Stop Simulation 🛑";
        btn.classList.replace('bg-purple-500', 'bg-red-500');
        runSimulationLoop();
      } else {
        btn.innerText = "Start Simulation 🐾";
        btn.classList.replace('bg-red-500', 'bg-purple-500');
      }
    }

    async function runSimulationLoop() {
      const pets = ["Max", "Bella", "Charlie"];
      while (isSimulating) {
        await new Promise(r => setTimeout(r, Math.random() * 4000 + 3000));
        if (!isSimulating) break;
        const pet = pets[Math.floor(Math.random() * pets.length)];
        const direction = Math.random() > 0.5 ? "IN" : "OUT";
        logMovement(pet, direction);
      }
    }

    function logMovement(pet, direction) {
      const moveData = { 
        pet, 
        direction, 
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 
        id: Date.now() 
      };
      
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      history.unshift(moveData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 50)));
      
      renderActivityItem(moveData, true);
      updateStatusCards(moveData);
      showToast(pet, direction);
    }

    function renderActivityItem(data, isNew) {
      const list = document.getElementById('activity-list');
      if (list.querySelector('p')) list.innerHTML = ''; 
      
      const item = document.createElement('div');
      item.className = `activity-item flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 ${isNew ? 'fade-in' : ''}`;
      item.innerHTML = `
        <div class="flex items-center gap-3">
          <span class="text-2xl">${data.direction === 'IN' ? '🏠' : '🌳'}</span>
          <div>
            <p class="text-white font-bold">${data.pet}</p>
            <p class="text-slate-400 text-xs">${data.direction === 'IN' ? 'Returned Home' : 'Went Outside'}</p>
          </div>
        </div>
        <span class="text-slate-400 font-mono text-sm">${data.time}</span>
      `;
      list.prepend(item);
    }

    function updateStatusCards(data) {
      const cardId = data.direction === 'IN' ? 'last-entry' : 'last-exit';
      document.getElementById(cardId).innerText = data.time;
    }

    function showToast(pet, direction) {
      const toast = document.getElementById('notification-toast');
      document.getElementById('notification-message').innerText = `${pet} just ${direction === 'IN' ? 'entered' : 'exited'} the door!`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
 </body>
</html>
