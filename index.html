<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com" />
  <script src="https://unpkg.com"></script>
  <style>
    body { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); } }
    @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .sensor-active { animation: pulse-glow 1.5s ease-in-out infinite; }
    .notification-slide { animation: slide-in 0.5s ease-out; }
    .fade-in { animation: fade-in 0.6s ease-out forwards; }
    .activity-item { animation: fade-in 0.4s ease-out; }
    .leaflet-tile-pane { filter: brightness(0.6) invert(100%) contrast(90%) hue-rotate(180deg); }
    #map { height: 300px; width: 100%; border-radius: 1.5rem; margin-top: 1rem; z-index: 1; }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="https://tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://jsdelivr.net" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   
   <!-- Notification Toast -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
     <div class="text-3xl">🐾</div>
     <div>
      <p class="font-bold" id="notification-title">Pet Alert!</p>
      <p class="text-sm opacity-90" id="notification-message"></p>
     </div>
    </div>
   </div>

   <!-- Login Screen -->
   <div id="login-screen" class="min-h-full flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8">
      <div class="text-7xl mb-4">🏠🐕</div>
      <h1 class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p class="text-slate-300 text-lg">Monitor your pet's activity</p>
     </div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <div><label class="block text-white font-semibold mb-2 text-sm">Username</label> <input type="text" placeholder="Enter username" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none transition-all"></div>
       <div><label class="block text-white font-semibold mb-2 text-sm">Password</label> <input type="password" placeholder="Enter password" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none transition-all"></div>
       <button onclick="handleLogin()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg shadow-lg"> Login 🐾 </button>
      </div>
     </div>
    </div>
   </div>

   <!-- Setup Screen -->
   <div id="setup-screen" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8"><div class="text-7xl mb-4">⚙️🐕</div><h1 class="text-4xl font-extrabold text-white mb-2">Configuration</h1></div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <div><label class="block text-white font-semibold mb-2 text-sm">Your Name</label> <input type="text" id="owner-name" placeholder="Enter name" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none"></div>
       <div><label class="block text-white font-semibold mb-2 text-sm">Pet Names</label> <input type="text" id="pet-names" placeholder="Max, Bella" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none"></div>
       
       <div class="border-t border-white/20 pt-5">
        <h2 class="text-white font-bold text-lg mb-2 uppercase text-xs tracking-widest">🔌 Virtual Engine</h2>
        <button onclick="enableSim()" id="sim-btn" class="w-full py-3 bg-white/5 hover:bg-white/10 text-blue-400 font-bold rounded-xl border border-blue-400/50 transition-all">Initialize Virtual Sensors</button>
       </div>

       <button id="start-btn" onclick="startDash()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold rounded-xl text-lg opacity-50 cursor-not-allowed transition-all" disabled> Start Tracking 🐾 </button>
      </div>
     </div>
    </div>
   </div>

   <!-- Dashboard Screen -->
   <div id="dash-screen" class="min-h-full p-8 hidden">
    <div class="max-w-5xl mx-auto space-y-6">
      <h2 id="dash-title" class="text-3xl font-black text-white">Dashboard</h2>
      
      <!-- Security Modes -->
      <div class="bg-white/5 p-4 rounded-3xl border border-white/10 flex justify-between items-center">
        <div class="flex items-center gap-3"><span id="mode-icon">🔓</span><span id="mode-status" class="text-xs font-bold text-slate-400">Free</span></div>
        <div class="flex gap-1">
          <button onclick="setMode('free')" id="btn-free" class="px-4 py-2 rounded-xl text-[10px] font-bold bg-white/10">Free</button>
          <button onclick="setMode('silent')" id="btn-silent" class="px-4 py-2 rounded-xl text-[10px] font-bold text-slate-500">Silent</button>
          <button onclick="setMode('alarmed')" id="btn-alarmed" class="px-4 py-2 rounded-xl text-[10px] font-bold text-slate-500">Alarmed</button>
        </div>
      </div>

      <!-- Map -->
      <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
        <div class="flex gap-2 mb-4">
          <input type="text" id="map-address" placeholder="Enter address..." class="flex-1 px-4 py-2 rounded-lg bg-white/10 text-white outline-none text-xs">
          <button onclick="updateMap()" class="px-4 py-2 bg-emerald-500 text-slate-900 font-bold rounded-lg text-xs">Map</button>
        </div>
        <div id="map"></div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center"><p id="last-in" class="text-3xl font-black text-emerald-400">--:--</p></div>
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center"><p id="last-out" class="text-3xl font-black text-blue-400">--:--</p></div>
      </div>

      <div class="bg-white/5 p-6 rounded-3xl border border-white/10 h-[300px] overflow-y-auto custom-scrollbar" id="log-feed">
        <p class="text-slate-500 text-center py-10">Awaiting movement...</p>
      </div>
    </div>
   </div>

  </div>

  <script>
    let isSim = false, pets = ["Max"], mode = 'free', alarm = null;
    const DB = 'pet_data_final';

    function handleLogin() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('setup-screen').classList.remove('hidden'); }
    function enableSim() { isSim = true; document.getElementById('sim-btn').innerText = "ONLINE ✅"; document.getElementById('start-btn').disabled = false; document.getElementById('start-btn').classList.remove('opacity-50'); }

    function startDash() {
      const owner = document.getElementById('owner-name').value || 'User';
      const petIn = document.getElementById('pet-names').value;
      if(petIn) pets = petIn.split(',').map(p => p.trim());
      document.getElementById('dash-title').innerText = `${owner}'s Smart Home`;
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('dash-screen').classList.remove('hidden');
      initMap(); loadLogs(); runSimLoop();
    }

    function setMode(m) {
      mode = m;
      const icons = { free: '🔓', silent: '🔕', alarmed: '🚨' };
      document.getElementById('mode-icon').innerText = icons[m];
      document.getElementById('mode-status').innerText = m.toUpperCase();
      ['free', 'silent', 'alarmed'].forEach(btn => { document.getElementById(`btn-${btn}`).className = `px-4 py-2 rounded-xl text-[10px] font-bold ${btn === m ? 'bg-white/10 text-white' : 'text-slate-500'}`; });
    }

    let map, marker;
    function initMap() { map = L.map('map').setView([40.7, -74], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); marker = L.marker([40.7, -74]).addTo(map); }
    async function updateMap() { const addr = document.getElementById('map-address').value; const res = await fetch(`https://openstreetmap.org{addr}`); const data = await res.json(); if(data.length) { map.setView([data[0].lat, data[0].lon], 15); marker.setLatLng([data[0].lat, data[0].lon]); } }

    async function runSimLoop() {
      while(isSim) {
        await new Promise(r => setTimeout(r, Math.random() * 600000 + 600000)); // 10-20 min
        const p = pets[Math.floor(Math.random()*pets.length)], d = Math.random() > 0.5 ? 'IN' : 'OUT';
        const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        logMove(p, d, t);
      }
    }

    function logMove(p, d, t) {
      const history = JSON.parse(localStorage.getItem(DB)) || [];
      history.unshift({p, d, t});
      localStorage.setItem(DB, JSON.stringify(history.slice(0,30)));
      updateUI({p, d, t}, true);
    }

    function updateUI(data, isNew) {
      const feed = document.getElementById('log-feed');
      if(feed.innerText.includes('Awaiting')) feed.innerHTML = '';
      const div = document.createElement('div');
      div.className = "flex justify-between items-center p-4 border-b border-white/5 activity-item";
      div.innerHTML = `<div><p class="font-bold text-white text-sm">${data.p}</p><p class="text-xs text-slate-500">${data.d === 'IN' ? 'Came home' : 'Went out'}</p></div><span class="text-xs font-mono text-slate-500">${data.t}</span>`;
      feed.prepend(div);
      document.getElementById(data.d === 'IN' ? 'last-in' : 'last-out').innerText = data.t;
      if(isNew && mode !== 'free') {
        document.getElementById('notification-message').innerText = `${data.p} just moved!`;
        document.getElementById('notification-toast').classList.remove('hidden');
        setTimeout(() => document.getElementById('notification-toast').classList.add('hidden'), 3000);
        if(mode === 'alarmed') { const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); setTimeout(() => osc.stop(), 500); }
      }
    }

    function loadLogs() { const h = JSON.parse(localStorage.getItem(DB)) || []; h.reverse().forEach(e => updateUI(e, false)); }
  </script>
 </body>
</html>
