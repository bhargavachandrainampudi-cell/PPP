<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-in 0.6s ease-out forwards; }
    .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
  </style>
</head>
<body class="h-full bg-[#1a1a2e] text-white overflow-hidden">
  <div id="app-wrapper" class="h-full w-full overflow-y-auto custom-scrollbar p-6 flex flex-col items-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    
    <!-- Notification Toast -->
    <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
      <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce">
        <span class="text-2xl">🐾</span>
        <div><p class="font-bold">Pet Alert!</p><p id="notification-message" class="text-sm opacity-90"></p></div>
      </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="w-full max-w-md fade-in py-10">
      <div class="text-center mb-8">
        <div class="text-7xl mb-4">🏠🐕</div>
        <h1 class="text-4xl font-extrabold mb-2">Pet Door Tracker</h1>
        <p class="text-slate-300 text-lg">Monitor your pet's activity</p>
      </div>
      
      <div class="glass rounded-3xl p-8 shadow-2xl space-y-5">
        <div>
          <label class="block font-semibold mb-2 text-sm">Owner Name</label>
          <input type="text" id="owner-name" placeholder="Your name" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
        </div>
        <div>
          <label class="block font-semibold mb-2 text-sm">Pet Names (comma-separated)</label>
          <input type="text" id="pet-names" placeholder="e.g. Max, Bella" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
        </div>
        <button onclick="goToDash()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg shadow-lg shadow-emerald-500/30 transform transition-all active:scale-95">
          Start Tracking 🐾
        </button>
      </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dash-screen" class="w-full max-w-5xl hidden fade-in py-6">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
        <h2 id="dash-title" class="text-3xl font-black">Dashboard</h2>
        <button onclick="toggleSim()" id="sim-btn" class="px-6 py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl font-bold transition-all">
          Start Simulation ⚡
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-center sm:text-left">
        <div class="glass p-6 rounded-3xl">
          <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Last Entry</p>
          <p id="last-entry" class="text-4xl text-emerald-400 font-black mt-2">--:--</p>
        </div>
        <div class="glass p-6 rounded-3xl">
          <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Last Exit</p>
          <p id="last-exit" class="text-4xl text-blue-400 font-black mt-2">--:--</p>
        </div>
      </div>

      <div class="glass rounded-3xl p-6">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold">Activity Log</h3>
          <button onclick="clearHistory()" class="text-xs text-slate-500 hover:text-red-400 font-bold uppercase tracking-tighter">Clear All</button>
        </div>
        <div id="activity-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          <p class="text-slate-500 text-center py-10 italic">No movements recorded...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isSim = false, pets = ["Max"];
    const KEY = 'pet_tracker_local';

    function goToDash() {
      const name = document.getElementById('owner-name').value || 'Owner';
      const petInput = document.getElementById('pet-names').value;
      if (petInput) pets = petInput.split(',').map(p => p.trim());
      
      document.getElementById('dash-title').innerText = `${name}'s Home`;
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('dash-screen').classList.remove('hidden');
      loadHistory();
    }

    function toggleSim() {
      isSim = !isSim;
      const b = document.getElementById('sim-btn');
      b.innerText = isSim ? "Stop Simulation 🛑" : "Start Simulation ⚡";
      b.classList.toggle('bg-red-500/20', isSim);
      if (isSim) runLoop();
    }

    async function runLoop() {
      while (isSim) {
        await new Promise(r => setTimeout(r, Math.random() * 4000 + 3000));
        if (!isSim) break;
        const pet = pets[Math.floor(Math.random() * pets.length)];
        const dir = Math.random() > 0.5 ? "IN" : "OUT";
        logMovement(pet, dir);
      }
    }

    function logMovement(pet, dir) {
      const data = { pet, dir, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), id: Date.now() };
      const history = JSON.parse(localStorage.getItem(KEY)) || [];
      history.unshift(data);
      localStorage.setItem(KEY, JSON.stringify(history.slice(0, 50)));
      renderItem(data, true);
    }

    function renderItem(data, isNew) {
      const list = document.getElementById('activity-list');
      if (list.innerText.includes('No movements')) list.innerHTML = '';
      
      const item = document.createElement('div');
      item.className = "flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5 fade-in";
      item.innerHTML = `<div class="flex items-center gap-3"><span>${data.dir === 'IN' ? '🏠' : '🌳'}</span><div><p class="font-bold">${data.pet}</p><p class="text-xs text-slate-400">${data.dir === 'IN' ? 'Came in' : 'Went out'}</p></div></div><span class="text-xs font-mono text-slate-500">${data.time}</span>`;
      list.prepend(item);
      document.getElementById(data.dir === 'IN' ? 'last-entry' : 'last-exit').innerText = data.time;
      if (isNew) showToast(`${data.pet} just moved ${data.dir}!`);
    }

    function showToast(m) {
      const t = document.getElementById('notification-toast');
      document.getElementById('notification-message').innerText = m;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function loadHistory() {
      const h = JSON.parse(localStorage.getItem(KEY)) || [];
      if (h.length) {
        document.getElementById('activity-list').innerHTML = '';
        [...h].reverse().forEach(e => renderItem(e, false));
      }
    }

    function clearHistory() { localStorage.removeItem(KEY); location.reload(); }
  </script>
</body>
</html>
