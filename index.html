<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); } }
    @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .sensor-active { animation: pulse-glow 1.5s ease-in-out infinite; }
    .notification-slide { animation: slide-in 0.5s ease-out; }
    .fade-in { animation: fade-in 0.6s ease-out forwards; }
    .activity-item { animation: fade-in 0.4s ease-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
  </style>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   
   <!-- Notification Toast -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
     <div class="text-3xl">🐾</div>
     <div>
      <p class="font-bold" id="notification-title">Pet Alert!</p>
      <p class="text-sm opacity-90" id="notification-message"></p>
     </div>
    </div>
   </div>

   <!-- Login Screen -->
   <div id="login-screen" class="min-h-full flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8">
      <div class="text-7xl mb-4">🏠🐕</div>
      <h1 class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p class="text-slate-300 text-lg">Monitor your pet's activity</p>
     </div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <div>
        <label class="block text-white font-semibold mb-2 text-sm">Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div>
       <div>
        <label class="block text-white font-semibold mb-2 text-sm">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div>
       <button onclick="handleLogin()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-emerald-500/30"> Login 🐾 </button>
      </div>
     </div>
    </div>
   </div>

   <!-- Setup Screen (Same imagery, Sim button replacing Arduino) -->
   <div id="setup-screen" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8">
      <div class="text-7xl mb-4">🏠🐕</div>
      <h1 class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p class="text-slate-300 text-lg">Monitor your pet's activity</p>
     </div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <div>
        <label class="block text-white font-semibold mb-2 text-sm">Your Name</label> 
        <input type="text" id="owner-name" placeholder="Enter your name" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 font-medium outline-none transition-all">
       </div>
       <div>
        <label class="block text-white font-semibold mb-2 text-sm">Pet Names (comma-separated)</label> 
        <input type="text" id="pet-names" placeholder="Max, Bella, Charlie" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 font-medium outline-none transition-all">
       </div>

       <!-- THE REPLACED ARDUINO SECTION -->
       <div class="border-t border-white/20 pt-5 text-center">
        <h2 class="text-white font-bold text-lg mb-2">⚡ Simulation Engine</h2>
        <p class="text-slate-400 text-sm mb-4">No hardware detected. Use simulation mode to test tracking.</p>
        <button onclick="toggleSimulationMode()" id="sim-toggle-btn" class="w-full py-3 bg-white/10 hover:bg-white/20 text-blue-400 font-bold rounded-xl transition-all border border-blue-400/50">
          Enable Simulation Mode
        </button>
       </div>

       <button id="start-btn" onclick="goToDashboard()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg transition-all opacity-50 cursor-not-allowed" disabled> Start Tracking 🐾 </button>
      </div>
     </div>
    </div>
   </div>

   <!-- Dashboard Screen -->
   <div id="dashboard-screen" class="min-h-full p-6 hidden">
    <div class="max-w-4xl mx-auto py-10">
      <div class="flex justify-between items-center mb-8">
        <h2 id="welcome-text" class="text-3xl font-black text-white">Dashboard</h2>
        <div class="flex gap-2">
          <button onclick="location.reload()" class="p-3 bg-white/10 rounded-xl text-white">🔄</button>
        </div>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Last Entry</p>
          <p id="last-in" class="text-4xl text-emerald-400 font-black mt-2">--:--</p>
        </div>
        <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Last Exit</p>
          <p id="last-out" class="text-4xl text-blue-400 font-black mt-2">--:--</p>
        </div>
      </div>

      <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-6 border border-white/20">
        <h3 class="text-xl font-bold text-white mb-6">Recent Activity</h3>
        <div id="activity-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          <p class="text-slate-500 text-center py-10">Waiting for pet movement...</p>
        </div>
      </div>
    </div>
   </div>

  </div>

  <script>
    let isSimEnabled = false;
    let pets = ["Max"];
    const KEY = 'pet_history_data';

    function handleLogin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }

    function toggleSimulationMode() {
      isSimEnabled = !isSimEnabled;
      const btn = document.getElementById('sim-toggle-btn');
      const startBtn = document.getElementById('start-btn');
      
      if(isSimEnabled) {
        btn.innerText = "Simulation Mode: READY";
        btn.classList.replace('text-blue-400', 'text-emerald-400');
        btn.classList.replace('border-blue-400/50', 'border-emerald-400/50');
        startBtn.disabled = false;
        startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }

    function goToDashboard() {
      const owner = document.getElementById('owner-name').value || 'Owner';
      const petInput = document.getElementById('pet-names').value;
      if(petInput) pets = petInput.split(',').map(p => p.trim());
      
      document.getElementById('welcome-text').innerText = `${owner}'s Tracker`;
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      
      loadHistory();
      startSimLoop();
    }

    async function startSimLoop() {
      while(true) {
        await new Promise(r => setTimeout(r, Math.random() * 5000 + 4000));
        const pet = pets[Math.floor(Math.random() * pets.length)];
        const dir = Math.random() > 0.5 ? 'IN' : 'OUT';
        logMovement(pet, dir);
      }
    }

    function logMovement(pet, dir) {
      const data = { pet, dir, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), id: Date.now() };
      const history = JSON.parse(localStorage.getItem(KEY)) || [];
      history.unshift(data);
      localStorage.setItem(KEY, JSON.stringify(history.slice(0, 30)));
      renderItem(data, true);
    }

    function renderItem(data, isNew) {
      const list = document.getElementById('activity-list');
      if(list.innerText.includes('Waiting')) list.innerHTML = '';
      
      const item = document.createElement('div');
      item.className = "activity-item flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10";
      item.innerHTML = `<div class="flex items-center gap-3"><span>${data.dir === 'IN' ? '🏠' : '🌳'}</span><div><p class="text-white font-bold">${data.pet}</p><p class="text-slate-400 text-xs">${data.dir === 'IN' ? 'Returned Home' : 'Went Outside'}</p></div></div><span class="text-slate-400 text-xs font-mono">${data.time}</span>`;
      
      list.prepend(item);
      document.getElementById(data.dir === 'IN' ? 'last-in' : 'last-out').innerText = data.time;
      if(isNew) {
        const toast = document.getElementById('notification-toast');
        document.getElementById('notification-message').innerText = `${data.pet} just ${data.dir === 'IN' ? 'entered' : 'exited'}!`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
      }
    }

    function loadHistory() {
      const h = JSON.parse(localStorage.getItem(KEY)) || [];
      if(h.length) {
        document.getElementById('activity-list').innerHTML = '';
        [...h].reverse().forEach(e => renderItem(e, false));
      }
    }
  </script>
 </body>
</html>
